<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jelly Belly Flavor Showdown</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <h1>Jelly Belly Flavor Showdown</h1>
      <p class="subtitle">Signature 30 Collection &mdash; Pick your champion!</p>
    </div>
    <button id="print-btn">Print Empty Bracket</button>
    <button id="reset-btn">Reset Bracket</button>
  </header>

  <div id="round-labels">
    <div class="round-label-col">Round of 32</div>
    <div class="round-label-col">Round of 16</div>
    <div class="round-label-col">Quarterfinals</div>
    <div class="round-label-col">Semifinals</div>
    <div class="round-label-col champion-label">Champion</div>
    <div class="round-label-col">Semifinals</div>
    <div class="round-label-col">Quarterfinals</div>
    <div class="round-label-col">Round of 16</div>
    <div class="round-label-col">Round of 32</div>
  </div>

  <div id="bracket-wrapper">
    <div id="bracket">
      <!-- Rendered by script.js -->
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
